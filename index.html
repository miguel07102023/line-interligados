<style>

.auth-logo{display:flex;align-items:center;gap:13px}.logo-box{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,#2f6aa3,#123a6d);box-shadow:0 12px 32px rgba(23,74,122,.35)}

.auth-copy h1{font-size:48px;line-height:1.04;letter-spacing:-2px;margin-bottom:18px}.auth-copy p{font-size:15px;line-height:1.7;color:#aab8cb;max-width:520px}
.auth-features{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}.auth-chip{border:1px solid rgba(255,255,255,.08);background:rgba(7,13,24,.34);padding:10px 13px;border-radius:12px;font-size:11px;color:#d7deea;display:flex;align-items:center;gap:7px}
.auth-panel{display:grid;place-items:center;padding:20px}.auth-card{width:min(440px,100%);background:rgba(11,19,33,.94);border:1px solid var(--border);border-radius:24px;padding:30px;box-shadow:var(--shadow)}
.auth-card h2{font-size:25px;margin-bottom:6px}.auth-card>p{font-size:12px;color:var(--muted);margin-bottom:22px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:#08111e;border-radius:11px;padding:4px;margin-bottom:20px}.auth-tab{border:0;background:transparent;color:#8fa0b6;padding:10px;border-radius:8px;font-size:12px;font-weight:600}.auth-tab.active{background:#162237;color:#fff}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}.field label{font-size:11px;color:#b7c2d3}.field input,.field select,.field textarea{width:100%;background:#08111e;color:#fff;border:1px solid var(--border);outline:0;border-radius:11px;padding:12px 13px}.field input:focus,.field select:focus{border-color:rgba(30,79,138,.5);box-shadow:0 0 0 3px rgba(30,79,138,.08)}

.auth-submit{width:100%;margin-top:5px}.helper{margin-top:14px;color:#718198;font-size:10px;line-height:1.5}

.shell{display:flex;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar-w);background:linear-gradient(180deg,#07101c,#050c16);border-right:1px solid var(--border);padding:20px 15px;display:flex;flex-direction:column;z-index:30}
.brand{display:flex;align-items:center;gap:12px;padding:8px 9px 26px}.brand .logo-box{width:42px;height:42px}.brand strong{font-size:23px;letter-spacing:1px}.brand small{display:block;color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.nav{display:flex;flex-direction:column;gap:5px}.nav a{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:11px;color:#b9c5d5;font-size:13px;font-weight:500;transition:.18s}.nav a:hover{background:rgba(255,255,255,.035);color:#fff}.nav a.active{background:linear-gradient(90deg,rgba(23,74,122,.40),rgba(16,52,98,.22));border:1px solid rgba(30,79,138,.14);color:#fff}.nav a.active svg{color:#b9d4ee}.nav-badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:#174a7a;display:grid;place-items:center;font-size:10px;font-weight:800}
.sidebar-bottom{margin-top:auto}.user-card{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.02)}.avatar{width:39px;height:39px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:800;background:linear-gradient(145deg,#293447,#101827);border:2px solid rgba(255,255,255,.10)}.user-card b{font-size:12px}.user-card small{display:block;color:var(--muted);font-size:10px;margin-top:3px}.online{font-size:9px;color:#b7c2d3;margin-top:4px}.online:before{content:"";display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:5px}.logout{width:100%;display:flex;align-items:center;gap:10px;margin-top:10px;padding:12px;border:0;border-radius:11px;background:#111b2b;color:#fff;font-weight:600}
.main{margin-left:var(--sidebar-w);width:calc(100% - var(--sidebar-w));padding:24px 26px 90px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:24px}.welcome h1{font-size:28px;letter-spacing:-1px;margin-bottom:6px}.welcome p{font-size:12px;color:var(--muted)}.top-actions{display:flex;align-items:center;gap:10px}.search{width:250px;height:42px;background:#0b1524;border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;padding:0 12px;gap:8px}.search input{background:transparent;border:0;outline:0;color:#fff;flex:1;font-size:12px}.icon-btn{width:42px;height:42px;border-radius:11px;border:1px solid var(--border);background:#0b1524;color:#fff;display:grid;place-items:center}.top-user{display:flex;align-items:center;gap:9px}.top-user b{font-size:12px}.top-user small{display:block;color:var(--muted);font-size:10px;margin-top:2px}
.page-toolbar{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px}.page-title h2{font-size:21px;margin-bottom:5px}.page-title p{font-size:11px;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.stat{padding:17px;border-radius:16px;border:1px solid var(--border);min-height:112px;display:flex;align-items:flex-start;gap:13px;box-shadow:var(--shadow)}.stat.purple{background:linear-gradient(135deg,rgba(16,52,98,.38),rgba(27,18,67,.92))}.stat.blue{background:linear-gradient(135deg,rgba(30,64,175,.42),rgba(6,29,64,.95))}.stat.yellow{background:linear-gradient(135deg,rgba(146,88,8,.40),rgba(64,35,5,.95))}.stat.green{background:linear-gradient(135deg,rgba(22,101,52,.42),rgba(6,54,35,.95))}.stat-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.10)}.stat label{font-size:11px;color:#dce5f1}.stat strong{display:block;font-size:25px;margin-top:3px}.stat small{display:block;margin-top:7px;font-size:9px;color:#aeb9ca}
.dash-grid{display:grid;grid-template-columns:1.04fr .96fr;gap:14px;margin-bottom:14px}.panel{background:linear-gradient(180deg,rgba(15,24,39,.96),rgba(10,18,31,.96));border:1px solid var(--border);border-radius:17px;padding:15px;box-shadow:var(--shadow)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.panel-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}.panel-title svg{color:#8fb8dc}.ghost-btn{border:0;border-radius:9px;padding:8px 10px;background:rgba(16,52,98,.34);color:#fff;font-size:10px}
.event-hero{display:grid;grid-template-columns:150px 1fr;gap:14px}.cover{min-height:145px;border-radius:13px;padding:14px;background:radial-gradient(circle at 70% 20%,rgba(245,158,11,.28),transparent 30%),linear-gradient(145deg,#452909,#1c1308);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.cover span{font-size:36px}.cover b{font-size:20px;line-height:1;text-transform:uppercase;color:#f7d69a}.event-info h3{font-size:19px;margin-bottom:8px}.status{display:inline-flex;align-items:center;padding:5px 8px;border-radius:99px;font-size:9px;font-weight:700}.green{background:rgba(34,197,94,.14);color:#4ade80}.yellow{background:rgba(245,158,11,.14);color:#fbbf24}.purple-tag{background:rgba(30,79,138,.17);color:#b9d4ee}.gray{background:rgba(148,163,184,.12);color:#cbd5e1}.info{display:flex;align-items:center;gap:7px;font-size:10px;color:#c7d1df;margin:8px 0}.info svg{width:14px;height:14px}

.schedule{margin-top:13px;border-radius:12px;overflow:hidden;background:#101a2b}.schedule-row{display:grid;grid-template-columns:1fr 1.1fr auto;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.045);font-size:10px}.role,.person{display:flex;align-items:center;gap:7px}.mini{width:25px;height:25px;border-radius:7px;display:grid;place-items:center}.mini.purple{background:#123a6d}.mini.orange{background:#f59e0b}.mini.pink{background:#ec4899}.person .avatar{width:25px;height:25px;font-size:9px}.check{width:18px;height:18px;border-radius:50%;background:rgba(34,197,94,.14);color:#4ade80;display:grid;place-items:center}
.upcoming{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}.date-box{width:52px;height:52px;border-radius:11px;background:#08111e;display:grid;place-items:center;text-align:center}.date-box b{display:block;color:#2f6aa3;font-size:20px}.date-box small{font-size:9px;color:#cbd5e1}.upcoming h4{font-size:11px;margin-bottom:5px}.upcoming p{font-size:9px;color:var(--muted)}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.activity{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.045)}.act-icon{width:20px;height:20px;border-radius:50%;display:grid;place-items:center}.act-icon.ok{background:#22c55e}.act-icon.wait{border:2px solid #f59e0b;color:#fbbf24}.activity p{font-size:10px}.activity small{font-size:9px;color:#6f8199}
.indicators{display:grid;grid-template-columns:140px 1fr;align-items:center;min-height:135px}.donut{width:105px;height:105px;border-radius:50%;margin:auto;position:relative;background:conic-gradient(#22c55e 0 67%,#f59e0b 67% 84%,#ef4444 84%)}.donut:after{content:"";position:absolute;inset:14px;border-radius:50%;background:#0c1625}.donut-copy{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center}.donut-copy strong{font-size:17px}.donut-copy small{font-size:8px;color:#aab8c9}.legend{display:flex;flex-direction:column;gap:11px}.legend-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;font-size:10px}.swatch{width:12px;height:12px;border-radius:4px}
.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:760px}.table th,.table td{padding:13px 11px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);font-size:10px}.table th{font-size:9px;color:#88a0bc;text-transform:uppercase;letter-spacing:.04em}.member-cell{display:flex;align-items:center;gap:8px}.member-cell .avatar{width:29px;height:29px;font-size:9px}.action-btn{border:0;border-radius:8px;background:#142033;color:#d9e2ef;padding:7px 9px;font-size:9px}
.calendar-shell{display:grid;grid-template-columns:1fr 260px;gap:14px}.calendar-panel{padding:15px}.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.calendar-header h3{font-size:16px}.cal-nav{display:flex;gap:7px}.cal-nav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#0a1422;color:#fff;display:grid;place-items:center}.weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr)}.weekdays div{text-align:center;color:#7890ad;font-size:9px;font-weight:700;padding:8px}.day{min-height:105px;border-top:1px solid rgba(255,255,255,.05);border-right:1px solid rgba(255,255,255,.04);padding:8px;position:relative;transition:.15s}.day:hover{background:rgba(255,255,255,.018)}.day.muted{opacity:.34}.day.today .day-num{background:#174a7a;color:#fff}.day-num{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:10px;font-weight:700}.cal-event{margin-top:6px;padding:6px 7px;border-radius:7px;font-size:8px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cal-event.purple{background:rgba(30,79,138,.17);color:#d8ccff;border-left:2px solid #1e4f8a}.cal-event.blue{background:rgba(59,130,246,.14);color:#bfdbfe;border-left:2px solid #3b82f6}.cal-event.yellow{background:rgba(245,158,11,.12);color:#fde68a;border-left:2px solid #f59e0b}.cal-side h3{font-size:13px;margin-bottom:12px}.side-event{padding:11px;border:1px solid rgba(255,255,255,.05);border-radius:11px;background:#0a1422;margin-bottom:9px}.side-event b{font-size:10px}.side-event p{font-size:9px;color:var(--muted);margin-top:5px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.settings-section h3{font-size:13px;margin-bottom:12px}.setting-line{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}.setting-line b{font-size:10px}.setting-line small{display:block;color:var(--muted);font-size:9px;margin-top:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:grid;place-items:center;padding:20px;z-index:100}.modal{width:min(560px,100%);background:#0c1625;border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow)}.modal h3{font-size:16px;margin-bottom:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field.full{grid-column:1/-1}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.secondary{border:0;background:#162236;color:#dce5f0;border-radius:10px;padding:10px 12px;font-size:10px}
.mobile-nav{display:none}

@media(max-width:760px){
 .auth-page{grid-template-columns:1fr;padding:14px}.auth-art{display:none}.auth-panel{padding:0}.auth-card{margin-top:5vh}
 .sidebar{display:none}.main{margin-left:0;width:100%;padding:18px 13px 82px}.search,.top-user>div:last-child{display:none}.welcome h1{font-size:23px}
 .stats{grid-template-columns:repeat(2,1fr);gap:9px}.stat{min-height:102px;padding:13px}.stat-icon{width:38px;height:38px}.stat strong{font-size:22px}
 .event-hero{grid-template-columns:105px 1fr}.cover{min-height:120px}.cover b{font-size:15px}.cover span{font-size:29px}
 .upcoming{grid-template-columns:50px 1fr}.upcoming>.status{display:none}.bottom-grid{grid-template-columns:1fr}.indicators{grid-template-columns:1fr}
 .calendar-shell{grid-template-columns:1fr}.calendar-panel{padding:10px}.day{min-height:73px;padding:5px}.cal-event{font-size:7px;padding:4px}.calendar-side{display:none}
 .profile-grid{grid-template-columns:1fr}.mobile-nav{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;bottom:0;left:0;right:0;height:66px;background:rgba(5,12,22,.97);border-top:1px solid var(--border);z-index:40}.mobile-nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#7f8fa6;font-size:8px}.mobile-nav a.active{color:#8fb8dc}
 .form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}
}

.notification-popover{
 position:fixed;top:72px;right:96px;width:min(360px,calc(100vw - 28px));z-index:95;
 background:#0c1625;border:1px solid var(--border);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.38);
 overflow:hidden
}

.notification-popover-head b{font-size:12px}.notification-popover-head small{font-size:9px;color:var(--muted)}

async function uploadAvatarFile(file){
  if(!file || !currentUser)return null;

  if(!file.type || !file.type.startsWith("image/")){
    alert("Selecione um arquivo de imagem.");
    return null;
  }

  const maxSize=5*1024*1024;
  if(file.size>maxSize){
    alert("A foto deve ter no máximo 5 MB.");
    return null;
  }

  const ext=(file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"");
  const path=`${currentUser.id}/avatar-${Date.now()}.${ext||"jpg"}`;

  const {data:uploadData,error:uploadError}=await supabaseClient
    .storage
    .from("avatars")
    .upload(path,file,{
      cacheControl:"3600",
      contentType:file.type,
      upsert:false
    });

  if(uploadError){
    console.error("Erro no upload do avatar:",uploadError);
    alert(`Não foi possível enviar a foto: ${uploadError.message||"erro no Storage"}`);
    return null;
  }

  const storedPath=uploadData?.path||path;
  const {data:publicData}=supabaseClient.storage.from("avatars").getPublicUrl(storedPath);

  if(!publicData?.publicUrl){
    alert("A foto foi enviada, mas não foi possível gerar a URL pública.");
    return null;
  }

  return `${publicData.publicUrl}?v=${Date.now()}`;
}

async function loadCurrentUser(userOverride=null){
 const user=userOverride || (await supabaseClient.auth.getSession()).data.session?.user;
 if(!user){authUser=null;currentUser=null;return null}
 authUser=user;

 const {data:profile,error}=await supabaseClient
   .from("profiles")
   .select("id,name,email,phone,photo_url,role,leadership_role,active,created_at")
   .eq("id",user.id)
   .maybeSingle();

 if(error){
   console.error("Erro ao carregar profile no Supabase:",error);
   currentUser=null;
   return null;
 }

 if(!profile){
   console.warn("Perfil não encontrado para o usuário autenticado.");
   currentUser=null;
   return null;
 }

 currentUser={
   ...profile,
   photo:profile.photo_url||"",
   area:user.user_metadata?.area||profile.leadership_role||(profile.role==="master"?"Administração":"Membro"),
   functions:[],
   schedules:0,
   status:profile.active===false?"Inativo":"Ativo"
 };
 return currentUser;
}

function withTimeout(promise,ms=7000){
 return Promise.race([
   promise,
   new Promise((_,reject)=>setTimeout(()=>reject(new Error("TIMEOUT")),ms))
 ]);
}

async function initializeApp(){
 // Renderiza uma interface imediatamente, sem segurar a tela em loading.
 document.getElementById("app").innerHTML=authPage();
 refreshIcons();

 try{
   const {data:{session},error}=await withTimeout(supabaseClient.auth.getSession(),5000);
   if(error)console.error("Erro ao recuperar sessão:",error);

   if(session?.user){
     showAppLoading("Carregando seu perfil...");
     await withTimeout(loadCurrentUser(session.user),7000);
   }else{
     currentUser=null;
     authUser=null;
   }
 }catch(error){
   console.error("Inicialização do Supabase:",error);
   currentUser=null;
   authUser=null;
 }

 render();
}

// IMPORTANTE: não fazemos await de chamadas Supabase dentro do callback.
// Isso evita travamento/deadlock do fluxo de autenticação.
supabaseClient.auth.onAuthStateChange((event,session)=>{
 setTimeout(async()=>{
   try{
     if(event==="SIGNED_OUT"){
       authUser=null;
       currentUser=null;
       render();
       return;
     }

     if((event==="SIGNED_IN"||event==="TOKEN_REFRESHED"||event==="INITIAL_SESSION") && session?.user){
       await loadCurrentUser(session.user);
       render();
     }
   }catch(error){
     console.error("Auth state change:",error);
   }
 },0);
});

async function login(e){
 e.preventDefault();

 const email=$("#loginEmail").value.trim().toLowerCase();
 const password=$("#loginPassword").value;
 const button=$("#loginButton");

 if(button){
   button.disabled=true;
   button.textContent="Entrando...";
 }

 setAuthMessage("","error");

 try{
   // No mobile, a autenticação pode levar mais de 8s.
   // Não usamos mais o timeout curto que gerava falso erro.
   const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});

   if(error)throw error;

   let user=data?.user||null;

   // Caso o retorno imediato venha incompleto, consulta a sessão já criada.
   if(!user){
     const {data:{session}}=await supabaseClient.auth.getSession();
     user=session?.user||null;
   }

   if(!user){
     throw new Error("Não foi possível recuperar a sessão após o login.");
   }

   // Tenta carregar o perfil até 3 vezes para tolerar atraso de rede/RLS.
   let profileLoaded=false;
   let lastProfileError=null;

   for(let attempt=0;attempt<3;attempt++){
     try{
       await loadCurrentUser(user);
       if(currentUser){
         profileLoaded=true;
         break;
       }
     }catch(err){
       lastProfileError=err;
     }
     await new Promise(resolve=>setTimeout(resolve,700));
   }

   if(!profileLoaded){
     console.error("Falha ao carregar perfil:",lastProfileError);
     throw new Error("Login realizado, mas o perfil não pôde ser carregado.");
   }

   route="dashboard";
   location.hash="dashboard";
   await render();

 }catch(error){
   console.error("Erro no login:",error);

   // Verifica se a autenticação foi concluída apesar de eventual falha/atraso.
   try{
     const {data:{session}}=await supabaseClient.auth.getSession();
     if(session?.user){
       await loadCurrentUser(session.user);
       if(currentUser){
         route="dashboard";
         location.hash="dashboard";
         await render();
         return;
       }
     }
   }catch(sessionError){
     console.error("Erro ao recuperar sessão:",sessionError);
   }

   let message="Não foi possível entrar. Confira seu e-mail e sua senha.";
   const raw=(error?.message||"").toLowerCase();

   if(raw.includes("invalid login credentials")){
     message="E-mail ou senha incorretos.";
   }else if(raw.includes("email not confirmed")){
     message="Seu e-mail ainda precisa ser confirmado.";
   }else if(raw.includes("profile")){
     message="O login foi aceito, mas houve um problema ao carregar seu perfil.";
   }else if(raw.includes("network") || raw.includes("fetch")){
     message="A conexão com o servidor falhou. Tente novamente.";
   }

   setAuthMessage(message,"error");

   if(button){
     button.disabled=false;
     button.textContent="Entrar";
   }
 }
}
async function register(e){
 e.preventDefault();
 const name=$("#regName").value.trim();
 const email=$("#regEmail").value.trim().toLowerCase();
 const password=$("#regPassword").value;
 const area=$("#regArea").value;
 const {data,error}=await supabaseClient.auth.signUp({
   email,
   password,
   options:{data:{name,area}}
 });
 if(error){
   console.error("Erro ao criar conta:",error);
   setAuthMessage(error.message||"Não foi possível criar a conta.","error");
   return;
 }
 if(data.session){
   await loadCurrentUser();
   route="dashboard";
   location.hash="dashboard";
   render();
 }else{
   setAuthMessage("Conta criada. Verifique seu e-mail para confirmar o cadastro e depois faça login.","success");
 }
}

function calendarPage(){
 const y=calendarCursor.getFullYear(),m=calendarCursor.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),start=(first.getDay()+6)%7;
 const prevLast=new Date(y,m,0).getDate();let cells=[];
 for(let i=0;i<42;i++){let day,cm=m,cy=y,muted=false;if(i<start){day=prevLast-start+i+1;cm=m-1;muted=true}else if(i>=start+last.getDate()){day=i-(start+last.getDate())+1;cm=m+1;muted=true}else day=i-start+1;let d=new Date(cy,cm,day);let iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;let evs=db.events.filter(e=>e.date===iso);cells.push(`<div class="day ${muted?"muted":""}"><div class="day-num">${day}</div>${evs.map(e=>`<div class="cal-event ${e.color}">${e.time} ${e.name}</div>`).join("")}</div>`)}
 const month=calendarCursor.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
 const thisMonth=db.events.filter(e=>{const d=new Date(e.date+"T12:00:00");return d.getMonth()===m&&d.getFullYear()===y});
 return `<div class="page-toolbar"><div class="page-title"><h2>Agenda da equipe</h2><p>Eventos aparecem automaticamente na data correta.</p></div>${isMaster()?`<button class="primary" onclick="openEventModal()">+ Criar evento</button>`:""}</div>
 <section class="calendar-shell"><article class="panel calendar-panel"><div class="calendar-header"><h3 style="text-transform:capitalize">${month}</h3><div class="cal-nav"><button onclick="moveMonth(-1)">${icon("chevron-left")}</button><button onclick="goToday()">Hoje</button><button onclick="moveMonth(1)">${icon("chevron-right")}</button></div></div><div class="weekdays">${["SEG","TER","QUA","QUI","SEX","SÁB","DOM"].map(x=>`<div>${x}</div>`).join("")}</div><div class="calendar-grid">${cells.join("")}</div></article>
 <aside class="panel calendar-side"><div class="panel-head"><div class="panel-title">${icon("calendar-days")}Eventos do mês</div></div>${thisMonth.length?thisMonth.map(e=>`<div class="side-event"><b>${e.name}</b><p>${new Date(e.date+"T12:00:00").toLocaleDateString("pt-BR")} • ${e.time}</p><p>${e.place}</p></div>`).join(""):`<p style="font-size:10px;color:var(--muted)">Nenhum evento neste mês.</p>`}</aside></section>`
}

function previewSelectedAvatar(input){
  const file=input?.files?.[0];
  if(!file)return;

  const maxSize=5*1024*1024;
  if(!file.type?.startsWith("image/")){
    alert("Selecione uma imagem válida.");
    input.value="";
    return;
  }
  if(file.size>maxSize){
    alert("A foto deve ter no máximo 5 MB.");
    input.value="";
    return;
  }

  const nameEl=document.getElementById("avatarFileName");
  if(nameEl)nameEl.textContent=file.name;

  const preview=document.getElementById("avatarPreview");
  if(!preview)return;

  const reader=new FileReader();
  reader.onload=()=>{
    preview.innerHTML=`<img src="${reader.result}" alt="Prévia da nova foto">`;
  };
  reader.readAsDataURL(file);
}

async function saveRealProfile(userId){
  const members=await fetchMembersReal();
  const u=members.find(x=>x.id===userId); if(!u)return;
  const own=u.id===currentUser.id;
  const canAdmin=isMaster();

  let photoUrl=u.photo_url||null;
  if(own){
    const file=document.getElementById("realAvatarFile")?.files?.[0];
    if(file){
      const uploaded=await uploadAvatarFile(file);
      if(!uploaded)return;
      photoUrl=uploaded;
    }
    const {error}=await supabaseClient.rpc("update_my_profile",{
      p_name:document.getElementById("rpName").value.trim()||u.name,
      p_phone:document.getElementById("rpPhone").value.trim(),
      p_photo_url:photoUrl
    });
    if(error){console.error(error);alert("Não foi possível salvar seu perfil.");return}
  }else if(canAdmin){
    const {error}=await supabaseClient.from("profiles").update({
      name:document.getElementById("rpName").value.trim()||u.name,
      phone:document.getElementById("rpPhone").value.trim(),
      role:document.getElementById("rpRole").value,
      leadership_role:document.getElementById("rpLeadership").value.trim()||null,
      active:document.getElementById("rpActive").value==="true"
    }).eq("id",userId);
    if(error){console.error(error);alert("Não foi possível atualizar o membro.");return}
  }

  if(canAdmin){
    await setMemberPrimaryTeam(userId,document.getElementById("rpTeam")?.value||"");
  }

  if(own)await loadCurrentUser(authUser);
  closeModal();
  await render();
}

async function saveProfile(id){
 const isSelf=String(id)===String(currentUser?.id);
 if(isSelf){
   const name=$("#pName").value.trim()||currentUser.name;
   const phone=$("#pPhone").value.trim();
   const photo_url=$("#pPhoto").value.trim();
   const email=$("#pEmail").value.trim().toLowerCase()||currentUser.email;

   const {error:profileError}=await supabaseClient
     .from("profiles")
     .update({name,phone,photo_url})
     .eq("id",currentUser.id);

   if(profileError){
     console.error(profileError);
     alert("Não foi possível salvar o perfil.");
     return;
   }

   if(email!==currentUser.email){
     const {error:emailError}=await supabaseClient.auth.updateUser({email});
     if(emailError){
       console.error(emailError);
       alert("Perfil salvo, mas não foi possível alterar o e-mail.");
     }
   }

   await loadCurrentUser();
   closeModal();
   render();
   return;
 }

 const u=db.users.find(x=>x.id===id);
 if(!u||!isMaster())return;
 u.name=$("#pName").value.trim()||u.name;
 u.phone=$("#pPhone").value.trim();
 u.photo=$("#pPhoto").value.trim();
 u.area=$("#pArea").value.trim()||u.area;
 save();
 closeModal();
 render();
}

function runAIScheduler(){const eventId=Number($("#aiEvent").value),event=db.events.find(e=>e.id===eventId),roles=["Story","Fotos","Design","Projeção","Reels"],candidates=db.users.filter(u=>u.role==="member"&&u.availability!==false);let a=[];roles.forEach(role=>{const pool=candidates.filter(u=>u.area===role||u.functions?.includes(role)).sort((x,y)=>(x.schedules||0)-(y.schedules||0));if(pool[0])a.push({role,memberId:pool[0].id,memberName:pool[0].name,email:pool[0].email,phone:pool[0].phone||""})});db.schedulesByEvent[eventId]=a;a.forEach(x=>{if(!db.notifications[x.email])db.notifications[x.email]=[];db.notifications[x.email].unshift({id:Date.now()+Math.random(),icon:"calendar-check",title:"Você foi escalado",text:`${x.role} • ${event.name}`,time:"Agora",read:false,details:`Evento: ${event.name}. Data: ${new Date(event.date+"T12:00:00").toLocaleDateString("pt-BR")}. Horário: ${event.time}. Local: ${event.place}.`})});save();$("#aiOutput").innerHTML=a.length?`<h4>Escala sugerida</h4>${a.map(x=>`<div class="ai-assignment"><span>${x.role}</span><b>${x.memberName}</b><span class="status green">Selecionado</span></div>`).join("")}<div style="font-size:8px;color:var(--muted);margin-top:10px">Atalhos de e-mail, WhatsApp e Google Agenda podem ser preparados, mas envio automático real exige backend, credenciais e autorização das APIs.</div>`:`<h4>Nenhum membro elegível.</h4>`;refreshIcons()}

const V8 = {
  events: [],
  teams: [],
  members: [],
  memberTeams: [],
  availability: [],
  schedules: [],
  notifications: [],
  logs: [],
  aiPreview: []
};

window.eventStatusLabel = function(status){
  return ({
    planning:"Planejamento",
    open_schedule:"Escala aberta",
    confirmed:"Confirmado",
    finished:"Finalizado",
    cancelled:"Cancelado"
  })[status] || status || "Planejamento";
}
window.eventStatusClass = function(status){
  return status==="confirmed"?"green":status==="open_schedule"?"yellow":status==="cancelled"?"status-declined":"gray";
}
window.scheduleStatusLabel = function(status){
  return ({pending:"Pendente",confirmed:"Confirmada",declined:"Recusada",replaced:"Substituída"})[status]||status;
}
window.scheduleStatusClass = function(status){return "status-"+(status||"pending")}
window.formatEventDate = function(date){
  if(!date)return "";
  return new Date(date+"T12:00:00").toLocaleDateString("pt-BR");
}
window.formatEventLong = function(date){
  if(!date)return "";
  return new Date(date+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
}
window.eventDateTimeValue = function(e){
  return new Date(`${e.event_date}T${e.start_time||"00:00"}`).getTime();
}
window.futureEvents = function(){
  const now=new Date();
  now.setHours(0,0,0,0);
  return V8.events.filter(e=>new Date(e.event_date+"T12:00:00")>=now).sort((a,b)=>eventDateTimeValue(a)-eventDateTimeValue(b));
}
window.teamNamesForUser = function(userId){
  return V8.memberTeams.filter(mt=>mt.user_id===userId).map(mt=>V8.teams.find(t=>t.id===mt.team_id)?.name).filter(Boolean);
}
window.memberById = function(id){return V8.members.find(m=>m.id===id)}
window.eventById = function(id){return V8.events.find(e=>Number(e.id)===Number(id))}
window.teamById = function(id){return V8.teams.find(t=>Number(t.id)===Number(id))}

window.loadV8State = async function(){
  if(!currentUser)return;
  const requests=[
    supabaseClient.from("events").select("*").order("event_date",{ascending:true}).order("start_time",{ascending:true}),
    supabaseClient.from("teams").select("*").eq("active",true).order("name"),
    supabaseClient.from("profiles").select("id,name,email,phone,photo_url,role,leadership_role,active,created_at").order("name"),
    supabaseClient.from("member_teams").select("user_id,team_id"),
    isMaster()
      ? supabaseClient.from("availability").select("*")
      : supabaseClient.from("availability").select("*").eq("user_id",currentUser.id),
    isMaster()
      ? supabaseClient.from("schedules").select("*")
      : supabaseClient.from("schedules").select("*").eq("user_id",currentUser.id),
    supabaseClient.from("notifications").select("*").eq("user_id",currentUser.id).order("created_at",{ascending:false}),
    isMaster()
      ? supabaseClient.from("activity_logs").select("*").order("created_at",{ascending:false}).limit(20)
      : Promise.resolve({data:[],error:null})
  ];
  const [events,teams,members,memberTeams,availability,schedules,notifications,logs]=await Promise.all(requests);
  for(const item of [events,teams,members,memberTeams,availability,schedules,notifications,logs]){
    if(item?.error)console.error("V8 load error:",item.error);
  }
  V8.events=events.data||[];
  V8.teams=teams.data||[];
  V8.members=members.data||[];
  V8.memberTeams=memberTeams.data||[];
  V8.availability=availability.data||[];
  V8.schedules=schedules.data||[];
  V8.notifications=notifications.data||[];
  V8.logs=logs.data||[];
}

window.userNotifications = function(){return V8.notifications||[]}
window.unreadCount = function(){return (V8.notifications||[]).filter(n=>!n.read_at).length}

window.setAvailabilityForEvent = async function(eventId,status){
  const {error}=await supabaseClient.rpc("set_my_availability",{p_event_id:Number(eventId),p_status:status});
  if(error){console.error(error);alert("Não foi possível salvar sua disponibilidade.");return}
  await loadV8State();await render();
}
window.availabilityFor = function(eventId,userId=currentUser.id){
  return V8.availability.find(a=>Number(a.event_id)===Number(eventId)&&a.user_id===userId)?.status||"pending";
}

window.updateMyScheduleStatus = async function(scheduleId,status){
  const id=Number(scheduleId);

  // Primeira opção: RPC segura no Supabase.
  const {error:rpcError}=await supabaseClient.rpc("update_my_schedule_status",{
    p_schedule_id:id,
    p_status:status
  });

  if(!rpcError){
    await loadV8State();
    await render();
    return;
  }

  console.warn("RPC update_my_schedule_status falhou, tentando update protegido por RLS:",rpcError);

  // Fallback: update direto. Só funciona para a própria escala, conforme policy RLS do patch v8.3.
  const {error:updateError}=await supabaseClient
    .from("schedules")
    .update({status})
    .eq("id",id)
    .eq("user_id",currentUser.id);

  if(updateError){
    console.error("Não foi possível atualizar a escala:",updateError);
    alert(
      "Não foi possível confirmar a escala. Atualize a página e tente novamente. " +
      "Se continuar, o administrador precisa executar o patch SQL v8.3 no Supabase."
    );
    return;
  }

  await loadV8State();
  await render();
}

window.openEventModal = function(eventId=null){
  if(!isMaster())return;
  const e=eventId?eventById(eventId):null;
  document.body.insertAdjacentHTML("beforeend",`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${e?"Editar evento":"Novo evento"}</h3><div class="form-grid">
    <div class="field full"><label>Nome</label><input id="eName" value="${e?.name||""}"></div>
    <div class="field"><label>Data</label><input id="eDate" type="date" value="${e?.event_date||""}"></div>
    <div class="field"><label>Início</label><input id="eTime" type="time" value="${e?.start_time?.slice(0,5)||""}"></div>
    <div class="field"><label>Fim</label><input id="eEndTime" type="time" value="${e?.end_time?.slice(0,5)||""}"></div>
    <div class="field full"><label>Localização</label><input id="ePlace" value="${e?.location||""}"></div>
    <div class="field full"><label>Descrição</label><textarea id="eDescription" rows="3">${e?.description||""}</textarea></div>
    <div class="field full"><label>Status</label><select id="eStatus">${[["planning","Planejamento"],["open_schedule","Escala aberta"],["confirmed","Confirmado"],["finished","Finalizado"],["cancelled","Cancelado"]].map(([v,l])=>`<option value="${v}" ${e?.status===v?"selected":""}>${l}</option>`).join("")}</select></div>
  </div><div class="modal-actions"><button class="secondary" onclick="closeModal()">Cancelar</button><button class="primary" onclick="saveEvent(${eventId||"null"})">${e?"Salvar":"Criar evento"}</button></div></div></div>`);
}
window.saveEvent = async function(eventId=null){
  const payload={
    name:document.getElementById("eName").value.trim(),
    event_date:document.getElementById("eDate").value,
    start_time:document.getElementById("eTime").value,
    end_time:document.getElementById("eEndTime").value||null,
    location:document.getElementById("ePlace").value.trim(),
    description:document.getElementById("eDescription").value.trim()||null,
    status:document.getElementById("eStatus").value,
    created_by:currentUser.id
  };
  if(!payload.name||!payload.event_date||!payload.start_time)return alert("Preencha nome, data e horário.");
  let response;
  if(eventId)response=await supabaseClient.from("events").update(payload).eq("id",eventId);
  else response=await supabaseClient.from("events").insert(payload);
  if(response.error){console.error(response.error);alert("Não foi possível salvar o evento.");return}
  await writeLog(eventId?`Atualizou o evento ${payload.name}`:`Criou o evento ${payload.name}`,"event",eventId||"",payload);
  closeModal();await loadV8State();await render();
}
window.openEventDetail = async function(id){
  const e=eventById(id);if(!e)return;
  const assigned=V8.schedules.filter(s=>Number(s.event_id)===Number(id));
  document.body.insertAdjacentHTML("beforeend",`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="panel-head"><div class="panel-title">${icon("calendar-days")}${e.name}</div><span class="status ${eventStatusClass(e.status)}">${eventStatusLabel(e.status)}</span></div>
    <div class="event-detail-grid"><div class="event-detail-item"><small>Data</small><b>${formatEventDate(e.event_date)}</b></div><div class="event-detail-item"><small>Horário</small><b>${e.start_time?.slice(0,5)||""}${e.end_time?` às ${e.end_time.slice(0,5)}`:""}</b></div><div class="event-detail-item"><small>Localização</small><b>${e.location||"—"}</b></div></div>
    ${e.description?`<div class="event-modal-description">${e.description}</div>`:""}
    <div class="scaled-list"><h4>Escalados</h4>${assigned.length?assigned.map(s=>{const m=memberById(s.user_id);return `<div class="scaled-person"><span>${s.role_name}</span><b>${m?.name||"Membro"} • ${scheduleStatusLabel(s.status)}</b></div>`}).join(""):`<div style="font-size:9px;color:var(--muted)">Nenhuma escala publicada ainda.</div>`}</div>
    <div class="modal-actions">${isMaster()?`<button class="danger-btn" onclick="deleteEvent(${e.id})">Apagar</button><button class="secondary" onclick="closeModal();setTimeout(()=>openEventModal(${e.id}),50)">Editar</button>`:""}<button class="primary" onclick="closeModal()">Fechar</button></div>
  </div></div>`);refreshIcons();
}
window.deleteEvent = async function(id){
  const e=eventById(id);if(!e||!confirm(`Apagar o evento "${e.name}"?`))return;
  const {error}=await supabaseClient.from("events").delete().eq("id",id);
  if(error){console.error(error);alert("Não foi possível apagar o evento.");return}
  await writeLog(`Apagou o evento ${e.name}`,"event",id,{name:e.name});
  closeModal();await loadV8State();await render();
}

window.calendarPage = async function(){
  const y=calendarCursor.getFullYear(),m=calendarCursor.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),start=(first.getDay()+6)%7,prevLast=new Date(y,m,0).getDate();
  let cells=[];
  for(let i=0;i<42;i++){
    let day,cm=m,cy=y,muted=false;
    if(i<start){day=prevLast-start+i+1;cm=m-1;muted=true}
    else if(i>=start+last.getDate()){day=i-(start+last.getDate())+1;cm=m+1;muted=true}
    else day=i-start+1;
    const d=new Date(cy,cm,day),iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const evs=V8.events.filter(e=>e.event_date===iso);
    cells.push(`<div class="day ${muted?"muted":""}"><div class="day-num">${day}</div>${evs.map(e=>`<div class="cal-event ${e.status==="open_schedule"?"yellow":e.status==="confirmed"?"blue":"purple"} clickable" onclick="openEventDetail(${e.id})">${e.start_time?.slice(0,5)||""} ${e.name}</div>`).join("")}</div>`)
  }
  const month=calendarCursor.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const thisMonth=V8.events.filter(e=>{const d=new Date(e.event_date+"T12:00:00");return d.getMonth()===m&&d.getFullYear()===y});
  return `<div class="page-toolbar"><div class="page-title"><h2>Agenda da equipe</h2><p>Eventos reais do Supabase nas datas corretas.</p></div>${isMaster()?`<button class="primary" onclick="openEventModal()">+ Criar evento</button>`:""}</div>
  <section class="calendar-shell"><article class="panel calendar-panel"><div class="calendar-header"><h3 style="text-transform:capitalize">${month}</h3><div class="cal-nav"><button onclick="moveMonth(-1)">${icon("chevron-left")}</button><button onclick="goToday()">Hoje</button><button onclick="moveMonth(1)">${icon("chevron-right")}</button></div></div><div class="weekdays">${["SEG","TER","QUA","QUI","SEX","SÁB","DOM"].map(x=>`<div>${x}</div>`).join("")}</div><div class="calendar-grid">${cells.join("")}</div></article>
  <aside class="panel calendar-side"><div class="panel-head"><div class="panel-title">${icon("calendar-days")}Eventos do mês</div></div>${thisMonth.length?thisMonth.map(e=>`<div class="side-event clickable" onclick="openEventDetail(${e.id})"><b>${e.name}</b><p>${formatEventDate(e.event_date)} • ${e.start_time?.slice(0,5)||""}</p><p>${e.location||"—"}</p></div>`).join(""):`<p style="font-size:10px;color:var(--muted)">Nenhum evento neste mês.</p>`}</aside></section>`;
}

window.memberScheduleCount = function(userId){
  return V8.schedules.filter(s=>s.user_id===userId&&s.status!=="replaced").length;
}
window.availabilityScore = function(eventId,userId){
  const st=availabilityFor(eventId,userId);
  return st==="available"?100:st==="unavailable"?-1000:20;
}
window.generateAIPreview = function(){
  const eventId=Number(document.getElementById("aiEvent").value);
  const event=eventById(eventId);if(!event)return;
  const operational=V8.teams.filter(t=>["Story","Fotos","Design","Projeção","Reels"].includes(t.name));
  const preview=[];
  operational.forEach(team=>{
    const ids=V8.memberTeams.filter(mt=>Number(mt.team_id)===Number(team.id)).map(mt=>mt.user_id);
    const candidates=V8.members.filter(m=>ids.includes(m.id)&&m.active&&m.role==="member"&&m.name!=="Michel Macedo");
    const ranked=candidates.map(m=>({
      m,
      score:availabilityScore(eventId,m.id)-memberScheduleCount(m.id)*3
    })).filter(x=>x.score>-900).sort((a,b)=>b.score-a.score);
    if(ranked[0])preview.push({teamId:team.id,role:team.name,userId:ranked[0].m.id,memberName:ranked[0].m.name,score:ranked[0].score})
  });
  V8.aiPreview=preview;
  document.getElementById("aiOutput").innerHTML=preview.length?`<h4>Sugestão para ${event.name}</h4><div class="ai-preview">${preview.map(a=>`<div class="ai-preview-row"><span>${a.role}</span><b>${a.memberName}</b><span class="status green">Score ${a.score}</span></div>`).join("")}</div><div class="integration-row"><button class="primary" onclick="publishAISchedule(${eventId})">Aprovar e publicar</button></div><div class="integration-note">Ao publicar, cada escalado recebe notificação interna. Depois da confirmação, o app oferece atalhos para e-mail, WhatsApp e Google Agenda.</div>`:`<h4>Nenhum membro elegível encontrado.</h4><p style="font-size:9px;color:var(--muted)">Cadastre membros nas equipes e informe disponibilidade.</p>`;
}
window.publishAISchedule = async function(eventId){
  if(!V8.aiPreview.length)return;
  const rows=V8.aiPreview.map(a=>({
    event_id:Number(eventId),user_id:a.userId,team_id:a.teamId,role_name:a.role,status:"pending",generated_by_ai:true
  }));
  // Remove apenas sugestões IA pendentes antigas para o mesmo evento.
  await supabaseClient.from("schedules").delete().eq("event_id",eventId).eq("generated_by_ai",true).eq("status","pending");
  const {data,error}=await supabaseClient.from("schedules").insert(rows).select();
  if(error){console.error(error);alert("Não foi possível publicar a escala.");return}
  const event=eventById(eventId);
  // Notificações internas
  const notifications=(data||[]).map(s=>({
    user_id:s.user_id,title:"Você foi escalado",message:`${s.role_name} • ${event.name} • ${formatEventDate(event.event_date)} às ${event.start_time?.slice(0,5)||""}`,
    type:"schedule",related_event_id:event.id
  }));
  if(notifications.length){
    const nres=await supabaseClient.from("notifications").insert(notifications);
    if(nres.error)console.warn("Notificação não inserida:",nres.error.message);
  }
  await writeLog(`Publicou escala automática de ${event.name}`,"schedule",event.id,{assignments:rows.length});
  V8.aiPreview=[];await loadV8State();alert("Escala publicada. Os membros já receberam notificação interna.");await render();
}

window.notificationsPage = async function(){
  return `<div class="page-toolbar"><div class="page-title"><h2>Minhas notificações</h2><p>Clique para abrir; a leitura é salva automaticamente.</p></div></div><article class="panel">${V8.notifications.length?V8.notifications.map(n=>`<div class="notification-item ${n.read_at?"read":"unread"} clickable" onclick="openNotificationDetail(${n.id})"><div class="notification-icon">${icon(n.type==="schedule"?"calendar-check":"bell")}</div><div><b>${n.title}</b><p>${n.message}</p></div>${n.read_at?`<span class="notification-time">${new Date(n.created_at).toLocaleDateString("pt-BR")}</span>`:`<span class="notification-dot"></span>`}</div>`).join(""):`<div class="notification-empty">Nenhuma notificação.</div>`}</article>`;
}

window.indicatorsPage = async function(){
  if(!isMaster())return generic("Acesso restrito","Indicadores são exclusivos dos administradores.");
  const total=V8.schedules.length||1,confirmed=V8.schedules.filter(s=>s.status==="confirmed").length,pending=V8.schedules.filter(s=>s.status==="pending").length,declined=V8.schedules.filter(s=>s.status==="declined").length;
  const pct=Math.round(confirmed/total*100);
  return `<section class="stats"><div class="stat purple"><div class="stat-icon">${icon("users")}</div><div><label>Membros ativos</label><strong>${V8.members.filter(m=>m.active).length}</strong><small>cadastros ativos</small></div></div><div class="stat blue"><div class="stat-icon">${icon("calendar-days")}</div><div><label>Eventos</label><strong>${V8.events.length}</strong><small>total cadastrado</small></div></div><div class="stat yellow"><div class="stat-icon">${icon("clock-3")}</div><div><label>Pendentes</label><strong>${pending}</strong><small>aguardando resposta</small></div></div><div class="stat green"><div class="stat-icon">${icon("circle-check")}</div><div><label>Confirmação</label><strong>${pct}%</strong><small>${confirmed} confirmadas</small></div></div></section>
  <article class="panel"><div class="panel-head"><div class="panel-title">${icon("chart-no-axes-combined")}Escalas por status</div></div><div class="legend"><div class="legend-row"><span class="swatch" style="background:#22c55e"></span><span>Confirmadas</span><b>${confirmed}</b></div><div class="legend-row"><span class="swatch" style="background:#f59e0b"></span><span>Pendentes</span><b>${pending}</b></div><div class="legend-row"><span class="swatch" style="background:#ef4444"></span><span>Recusadas</span><b>${declined}</b></div></div></article>`;
}

window.externalIntegrationLinks = function(scheduleId){
  const s=V8.schedules.find(x=>Number(x.id)===Number(scheduleId));if(!s)return "";
  const e=eventById(s.event_id),u=memberById(s.user_id);if(!e||!u)return "";
  const body=encodeURIComponent(`Olá ${u.name}! Sua escala está confirmada: ${s.role_name} no evento ${e.name}, dia ${formatEventDate(e.event_date)} às ${e.start_time?.slice(0,5)||""}, em ${e.location||"local a confirmar"}.`);
  const mail=`mailto:${u.email}?subject=${encodeURIComponent("Escala LINE • "+e.name)}&body=${body}`;
  const wa=u.phone?`https://wa.me/${u.phone.replace(/\D/g,"")}?text=${body}`:"#";
  const start=e.event_date.replaceAll("-","")+e.start_time.replace(":","")+"00";
  const endTime=e.end_time||e.start_time;
  const end=e.event_date.replaceAll("-","")+endTime.replace(":","")+"00";
  const gcal=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.name+" • "+s.role_name)}&dates=${start}/${end}&details=${body}&location=${encodeURIComponent(e.location||"")}`;
  return `<div class="integration-row"><a class="integration-btn" href="${mail}">${icon("mail")}E-mail</a><a class="integration-btn" href="${wa}" target="_blank" ${u.phone?"":'onclick="alert(\'Cadastre o WhatsApp no perfil.\');return false;"'}>${icon("message-circle")}WhatsApp</a><a class="integration-btn" href="${gcal}" target="_blank">${icon("calendar-plus")}Google Agenda</a></div>`;
}

window.page = async function(){
  if(route==="dashboard")return isMaster()?await dashboard():await memberHome();
  if(route==="eventos")return await eventsPage();
  if(route==="calendario")return await calendarPage();
  if(route==="escalas")return await schedulesPage();
  if(route==="membros")return isMaster()?await membersPageReal():generic("Acesso restrito","A gestão de membros é exclusiva dos administradores Master.");
  if(route==="equipes")return isMaster()?await teamsPageReal():generic("Acesso restrito","A gestão de equipes é exclusiva dos administradores Master.");
  if(route==="indicadores")return await indicatorsPage();
  if(route==="notificacoes")return await notificationsPage();
  if(route==="configuracoes")return configPage();
  return generic(titles()[route],"Área em preparação.");
}

window.mobileNav = function(){

    ?[["dashboard","house","Home"],["eventos","calendar-days","Eventos"],["calendario","calendar","Agenda"],["escalas","calendar-check","Escalas"],["membros","users","Equipe"]]
    :[["dashboard","house","Home"],["eventos","calendar-days","Eventos"],["calendario","calendar","Agenda"],["escalas","calendar-check","Escalas"],["notificacoes","bell","Avisos"]];
  return `<nav class="mobile-nav">${items.map(([r,i,l])=>`<a href="#${r}" class="${route===r?"active":""}">${icon(i)}${l}</a>`).join("")}</nav>`;
}

window.render = async function(){
  if(currentUser)syncCurrentUser();
  const app=document.getElementById("app");
  if(!currentUser){app.innerHTML=authPage();refreshIcons();return}
  app.innerHTML=shell(`<div class="loading-inline">Atualizando dados...</div>`);
  refreshIcons();
  await loadV8State();
  const content=await page();
  app.innerHTML=shell(content);
  refreshIcons();
}
